<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-color: #47c8ff;
      --text-color: #333;
      --text-color-light: #666;
      --title-color: #FC2E2E;
      --accent-yellow: #ffc107;
      --accent-green: #4caf50;
      --accent-red: #e61414;
      --accent-red-alt: #e74c3c;
      --accent-orange: #ff8800;
      --accent-blue: #4361ee;
      --accent-blue-hover: #3f37c9;
      --accent-cyan: #00E3E1;
      --input-bg: #fff;
      --input-text: #333;
      --input-border: #ccc;
      --packet-bg: #fff;
      --packet-border: #ccc;
      --no-results-bg: #f8f8f8;
      --highlight-bg: yellow;
      --highlight-text: #333;
      --modal-bg: #fff;
      --overlay-bg: rgba(0, 0, 0, 0.7);
      --shadow-color: rgba(0, 0, 0, 0.2);
      --toggle-bg: #e0e0e0;
      --toggle-active-bg: var(--accent-blue);
      --toggle-active-text: #fff;
      --itinerary-border: #e0e0e0;
      --ai-box-bg: #fff;
      --ai-box-shadow: rgba(0,0,0,0.15);
    }
    body.dark-mode {
      --bg-color: #1a1c20;
      --text-color: #e0e0e0;
      --text-color-light: #aaa;
      --title-color: #ff5c5c;
      --accent-yellow: #ffc107;
      --accent-green: #388e3c;
      --accent-red: #d32f2f;
      --accent-red-alt: #c0392b;
      --accent-orange: #f57c00;
      --accent-blue: #536dfe;
      --accent-blue-hover: #3d5afe;
      --accent-cyan: #00bcd4;
      --input-bg: #2c2f36;
      --input-text: #e0e0e0;
      --input-border: #555;
      --packet-bg: #22252a;
      --packet-border: #444;
      --no-results-bg: #22252a;
      --highlight-bg: #b8860b;
      --highlight-text: #fff;
      --modal-bg: #2c2f36;
      --overlay-bg: rgba(0, 0, 0, 0.8);
      --shadow-color: rgba(0, 0, 0, 0.4);
      --toggle-bg: #333;
      --toggle-active-bg: var(--accent-blue);
      --toggle-active-text: #fff;
      --itinerary-border: #444;
      --ai-box-bg: #2c2f36;
      --ai-box-shadow: rgba(0,0,0,0.3);
    }
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }
    #theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 20px;
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s, color 0.3s, border-color 0.3s;
    }
    #Search {
      background-color: var(--accent-yellow);
      color: #000;
    }
    #title {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      color: var(--title-color);
      width: 100%;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input,
    button,
    select,
    textarea {
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      width: 300px;
      transition: background-color 0.3s, color 0.3s, border-color 0.3s;
    }
    input[type="datetime-local"] {
        width: 300px;
    }
    input,
    select,
    textarea {
      background-color: var(--input-bg);
      color: var(--input-text);
    }
    .dynamic-input-group {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 10px;
    }
    .dynamic-input {
      margin-bottom: 0 !important;
    }
    .dynamic-input-group button {
      width: 30px !important;
      padding: 8px 0;
    }
    button {
      background-color: var(--accent-green);
      color: white;
      cursor: pointer;
      width: 100px;
    }
    #results {
      margin-top: 20px;
      width: 100%;
    }
    .packet {
      border: 1px solid var(--packet-border);
      padding: 10px;
      margin-bottom: 10px;
      background-color: var(--packet-bg);
    }
    .packet p {
      margin: 5px 0;
      word-wrap: break-word;
    }
    .packet .entry-type-header {
      font-weight: bold;
      font-size: 1.1em;
      color: var(--accent-blue);
      margin-bottom: 10px;
    }


    .packet button {
      margin-top: 5px;
      margin-right: 5px;
    }

    #Clear {
      background-color: var(--accent-red);
    }

    #Save {
      background-color: var(--accent-orange);
    }
    
    #undoBtn {
      background-color: var(--accent-cyan);
      color: #000;
    }

    #undoBtn:disabled {
      background-color: var(--toggle-bg);
      color: var(--text-color-light);
      cursor: not-allowed;
      opacity: 0.7;
    }


    .highlight {
      background-color: var(--highlight-bg);
      color: var(--highlight-text);
      font-weight: bold;
    }

    .no-results {
      padding: 15px;
      text-align: center;
      font-style: italic;
      background-color: var(--no-results-bg);
    }
    
    #mode-toggle {
        display: flex;
        justify-content: center;
        margin: 20px 0;
    }

    .toggle-btn {
        padding: 10px 20px;
        border: 1px solid var(--input-border);
        background-color: var(--toggle-bg);
        color: var(--text-color);
        cursor: pointer;
        transition: background-color 0.3s, color 0.3s;
        width: 120px;
    }

    .toggle-btn:first-child {
        border-top-left-radius: 5px;
        border-bottom-left-radius: 5px;
    }

    .toggle-btn:last-child {
        border-top-right-radius: 5px;
        border-bottom-right-radius: 5px;
        border-left: none;
    }
    
    .toggle-btn:not(:first-child):not(:last-child) {
        border-radius: 0;
        border-left: none;
    }

    .toggle-btn.active {
        background-color: var(--toggle-active-bg);
        color: var(--toggle-active-text);
        font-weight: bold;
    }

    .flight-segment {
        border: 1px solid var(--input-border);
        border-radius: 5px;
        padding: 15px;
        margin-bottom: 15px;
        background-color: var(--input-bg);
    }
    .flight-segment h4 {
        margin-top: 0;
        border-bottom: 1px solid var(--input-border);
        padding-bottom: 5px;
        margin-bottom: 10px;
    }
    .segment-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    .segment-row input {
        flex: 1;
        min-width: 200px;
        width: auto;
    }

    .itinerary-display {
      border: 1px solid var(--itinerary-border);
      border-radius: 5px;
      padding: 10px;
      margin-top: 10px;
    }
    .itinerary-summary {
        font-size: 0.9em;
        color: var(--text-color-light);
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px dashed var(--itinerary-border);
    }
    .itinerary-segment, .itinerary-layover {
        margin-bottom: 8px;
    }
    .itinerary-segment span {
        font-weight: bold;
    }
    .itinerary-layover {
        color: var(--accent-orange);
        font-style: italic;
        padding-left: 20px;
    }

    .fare-details {
      display: flex;
      gap: 10px;
    }
    .fare-details input {
      width: 145px;
    }

    .login-overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--overlay-bg);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .login-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .login-modal {
      background-color: var(--modal-bg);
      padding: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 10px 25px var(--shadow-color);
      width: 90%;
      max-width: 400px;
      text-align: center;
      transform: scale(0.95);
      transition: transform 0.3s ease, background-color 0.3s;
    }

    .login-overlay.visible .login-modal {
      transform: scale(1);
    }

    .login-modal h2 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: var(--text-color);
    }

    .login-modal p {
      margin-bottom: 1.5rem;
      color: var(--text-color-light);
    }

    .input-group {
      margin-bottom: 1rem;
      text-align: left;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--input-border);
      border-radius: 4px;
    }

    #loginButton {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: var(--accent-blue);
      color: white;
      transition: background-color 0.2s;
    }

    #loginButton:hover {
      background-color: var(--accent-blue-hover);
    }

    .login-error {
      color: var(--accent-red);
      margin-top: 1rem;
      height: 1.2rem;
      font-size: 0.9rem;
    }

    /* AI STYLES */
    .ai-controls {
      padding: 15px;
      margin: 10px 0;
      border: 1px dashed var(--input-border);
      border-radius: 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 300px;
    }
    .ai-controls button {
      width: 100%;
    }
    .ai-controls input[type="file"] {
      width: 100%;
    }

    #ai-assistant-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 350px;
      max-height: 500px;
      background-color: var(--ai-box-bg);
      border-radius: 12px;
      box-shadow: 0 6px 20px var(--ai-box-shadow);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    #ai-assistant-box.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    #ai-assistant-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      border-bottom: 1px solid var(--input-border);
    }

    #ai-assistant-header h4 {
      margin: 0;
      font-size: 1rem;
    }

    #ai-assistant-close {
      position: static;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-color-light);
      padding: 0;
    }

    #ai-chat-history {
        flex-grow: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 100px;
    }

    .chat-message {
        padding: 8px 12px;
        border-radius: 18px;
        max-width: 80%;
        word-wrap: break-word;
        font-size: 0.9rem;
    }

    .chat-message.user {
        background-color: var(--accent-blue);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    
    .chat-message.ai {
        background-color: var(--toggle-bg);
        color: var(--text-color);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }

    .chat-message.error {
        background-color: var(--accent-red-alt);
        color: white;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }

    .chat-message.info {
        font-style: italic;
        align-self: center;
        max-width: 100%;
        text-align: center;
        background-color: transparent;
        color: var(--text-color-light);
        padding: 2px;
    }

    #ai-input-container {
        display: flex;
        align-items: center;
        padding: 10px;
        border-top: 1px solid var(--input-border);
        gap: 5px;
    }

    #ai-user-input {
        flex-grow: 1;
        border: 1px solid var(--input-border);
        border-radius: 20px;
        padding: 8px 15px;
        resize: none;
        background-color: var(--input-bg);
        color: var(--input-text);
        font-family: inherit;
        font-size: 0.9rem;
        margin: 0;
    }

    #ai-record-btn, #ai-send-btn {
        border: none;
        background-color: transparent;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--accent-blue);
        width: 40px;
        height: 40px;
        padding: 0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s;
    }

    #ai-record-btn:hover, #ai-send-btn:hover {
        background-color: var(--toggle-bg);
    }

    #ai-record-btn.recording {
        color: var(--accent-red);
        animation: pulse 1.5s infinite;
    }
    
    #loadingStatus {
      text-align: center;
      padding: 10px;
      color: var(--text-color-light);
      font-style: italic;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(230, 20, 20, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(230, 20, 20, 0); }
        100% { box-shadow: 0 0 0 0 rgba(230, 20, 20, 0); }
    }

    /* Custom Modal Styles */
    .modal-overlay {
      display: none; /* Hidden by default */
      position: fixed;
      z-index: 3000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: var(--overlay-bg);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: var(--modal-bg);
      margin: auto;
      padding: 20px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 5px 15px var(--shadow-color);
      text-align: center;
      animation: fadeIn 0.3s;
    }
    
    .modal-content.warning-modal #modalTitle {
      color: var(--accent-red);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    .modal-content h3 {
      margin-top: 0;
      color: var(--text-color);
    }

    .modal-content p {
      color: var(--text-color-light);
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      width: auto;
      min-width: 100px;
    }

    .modal-btn.confirm {
      background-color: var(--accent-blue);
      color: white;
    }
    .modal-btn.confirm:hover {
      background-color: var(--accent-blue-hover);
    }
    .modal-btn.cancel {
      background-color: var(--toggle-bg);
      color: var(--text-color);
    }
    .modal-btn.ok {
      background-color: var(--accent-blue);
      color: white;
    }

    /* Auto-update Pulse Animation */
    @keyframes greenPulse {
      0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
      100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
    }

    .auto-update-glow {
      animation: greenPulse 2s infinite;
      border-color: var(--accent-green) !important;
      background-color: rgba(76, 175, 80, 0.05) !important;
    }

  </style>
  <title>By Success</title>
  <script type="module">
    import { GoogleGenAI, Type } from "https://esm.run/@google/genai";
    window.GoogleGenAI = GoogleGenAI;
    window.GenaiType = Type;
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
</head>

<body>
  <button id="theme-toggle" title="Toggle dark/light mode">🌙</button>
  <div id="title">Four Direction Travels And Tours</div>
  <div class="expenses">
    <button onclick="window.location.href='expenses.html';"
      style="background-color: var(--accent-cyan); color: #000000;">In/Ex</button>
  </div>
  <div id="searchArea">
    <label for="searchInput">Search:</label>
    <input type="text" id="searchInput">
    <label for="dateLimit">Date Limit:</label>
    <input type="date" id="dateLimit">
    <div>
      <button id="Search" onclick="handleSearchClick()">Search</button>
      <button id="Clear" onclick="clearSearch(); showEntrySection()">Clear Search</button>
      <button id="undoBtn" onclick="undoLastAction()" disabled>Undo</button>
    </div>
  </div>
  
  <div id="mode-toggle">
    <button id="courier-mode-btn" class="toggle-btn active" onclick="setMode('courier')">Courier</button>
    <button id="ticketing-mode-btn" class="toggle-btn" onclick="setMode('ticketing')">Ticketing</button>
    <button id="manifest-mode-btn" class="toggle-btn" onclick="setMode('manifest')">Manifest</button>
  </div>

  <div id="entrySection">
    <!-- AI Controls -->
    <div class="ai-controls">
      <label for="imageUpload">Autofill with AI</label>
      <input type="file" id="imageUpload" accept="image/*,application/pdf">
      <button id="autofillBtn" onclick="handleAutofill()">Analyze Image</button>
    </div>

    <div>
      <!-- Common Fields -->
      <label>Date:</label>
      <input type="date" id="date">
      <label id="recNoLabel" for="recNo">Rec NO:</label>
      <input type="number" id="recNo">
      <label>Email:</label>
      <input type="text" id="email">
      <label>Price:</label>
      <input type="number" id="price">

      <!-- Courier Specific Fields -->
      <div id="courierForm">
        <label>Sender Name:</label>
        <input type="text" id="senderName">
        <label>Sender Address:</label>
        <input type="text" id="senderAddress">
        <label>Sender Contact Number:</label>
        <input type="number" id="senderContact">
        <label>Weight KG:</label>
        <input type="text" id="weightTicket">
        <label>Receiver Name:</label>
        <input type="text" id="receiverName">
        <label>Receiver Address:</label>
        <input type="text" id="receiverAddress">
        <label>Receiver Contact Number:</label>
        <input type="number" id="receiverContact">
        <label>Gateway:</label>
        <input type="text" id="update">
        <label>Bill Item</label>
        <input type="text" id="billItem">
        <label>Tracking Number:</label>
        <div id="trackingInputs">
          <div class="dynamic-input-group">
            <input type="text" id="trackingNumber" class="dynamic-input">
            <button type="button" onclick="addTrackingInput()"
              style="width: 30px; background-color: var(--accent-green);">+</button>
          </div>
        </div>
        <label>Delivered Date:</label>
        <input type="date" id="deliveredDate">
        <label>Item:</label>
        <div id="aboutCourierTicket">
          <textarea id="courierTicket" rows="5" cols="40"></textarea>
        </div>
      </div>

      <!-- Ticketing Specific Fields -->
      <div id="ticketingForm" style="display: none;">
        <label>Passenger Name:</label>
        <input type="text" id="passengerName">
        <label>Passenger Contact:</label>
        <input type="number" id="passengerContact">
        <label>PNR / Booking Reference:</label>
        <input type="text" id="pnrNumber">
        <label>Ticket Number:</label>
        <input type="text" id="ticketNumber">
        <label>Trip Type:</label>
        <select id="tripType">
            <option value="ONE_WAY">One Way</option>
            <option value="ROUND_TRIP">Round Trip</option>
        </select>
        <label>Fare Details:</label>
        <div class="fare-details">
            <input type="number" id="baseFare" placeholder="Base Fare">
            <input type="number" id="taxes" placeholder="Taxes">
        </div>

        <label>Flight Segments:</label>
        <div id="flightSegmentsContainer">
            <!-- Flight segments will be added here dynamically -->
        </div>
        <button type="button" onclick="addFlightSegment()" style="width: 300px;">+ Add Flight Segment</button>

        <label>Luggage Weight:</label>
        <input type="text" id="luggageWeight">
        <label>Remarks:</label>
        <textarea id="remarks" rows="5" cols="40"></textarea>
      </div>

      <!-- Manifest Specific Fields -->
      <div id="manifestForm" style="display: none;">
        <label>Pack:</label>
        <input type="text" id="pack">
        <label>Receiver Name:</label>
        <input type="text" id="manifestReceiverName">
        <label>Receiver Country:</label>
        <input type="text" id="receiverCountry">
        <label>Gateway:</label>
        <input type="text" id="manifestGateway">
      </div>
      
      <div id="updateButton">
        <button id="Save" onclick="saveData()">Save</button>
      </div>
    </div>
  </div>

  <div id="totalPrice"></div>
  <div id="totalPackages"></div>
  <div id="resultsTitle">Results:</div>
  <div id="results"></div>
  <div id="loadingStatus"></div>
  
  <div id="loginOverlay" class="login-overlay">
    <div class="login-modal">
      <h2>Admin Login</h2>
      <p>Four Direction Travels And Tours</p>
      <div class="input-group">
        <label for="adminEmail">Email</label>
        <input type="email" id="adminEmail" value="fourdirection02@gmail.com" disabled>
      </div>
      <div class="input-group">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" placeholder="Enter your password" autofocus>
      </div>
      <button id="loginButton">Login</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <div id="ai-assistant-box">
    <div id="ai-assistant-header">
        <h4>AI Assistant</h4>
        <button id="ai-assistant-close" onclick="hideAiMessage()">×</button>
    </div>
    <div id="ai-chat-history">
        <!-- Messages will be appended here -->
    </div>
    <div id="ai-input-container">
        <textarea id="ai-user-input" placeholder="Type or use voice to correct..." rows="2"></textarea>
